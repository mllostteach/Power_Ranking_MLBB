<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MỜ LỜ MẤT LÃO </title>
 
    <link rel="stylesheet" href="style.css">

    <script src="theme.js" defer></script>
    <script type="module" src="firebase.js"></script>
    <script type="module" src="game.js"></script>
</head>

<body>

    <div class="navbar">
        <div>MỜ LỜ MẤT NÃO</div>

        <div class="nav-links">
            <a href="pickem.html">Pick'Em MSC</a>
            <a href="Index36.html">ML Mất Não</a>
            <a href="MSCatEWC.html" class="msc-btn">MSC</a>
            <a href="M8.html" class="mseries-btn">M8</a>

            <a href="MPLID.html">MPL ID</a>
            <a href="MPLPH.html">MPL PH</a>
            <a href="MPLMY.html">MPL MY</a>

            <div class="dropdown">

                <a class="dropbtn">MCT SERIES ▾</a>

                <div class="dropdown-content">

                    <a href="India.html">India</a>
                    <a href="EECA.html">EECA</a>
                    <a href="MCTSEA.html">MCT SEA</a>
                    <a href="MCTEMEA.html">MCT EMEA</a>
                    <a href="MCTAMER.html">MCT AMER</a>
                    <a href="MCTEA.html">MCT EA</a>

                </div>
            </div>

            <button id="themeToggleBtn">🌙 Tối</button>
        </div>

        <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
    </div>



 
    </section>
    <div class="top-bar">

        <div class="gold-box">
            🪙 Vàng:
                <span id="gold">20</span>
        </div>

        <div class="refresh-box">
            🔄 Refresh:
            <span id="refreshCount">4</span>
        </div>
        

        <button id="refreshBtn">
            Làm mới
        </button>
        <select id="musicSelect" style="padding:8px;border-radius:8px;border:1px solid var(--border-light);background:var(--bg-secondary);color:var(--text-primary);margin-left:8px">
            <option value="M7" selected>M7 (mặc định)</option>
            <option value="M4">M4</option>
            <option value="M5">M5</option>
            <option value="M6">M6</option>
            <option value="M3">M3</option>
        </select>
        <button id="musicToggle">🔊 Bật nhạc</button>

    </div>
    <!-- Resource choice modal (shows before team selection) -->
    <div id="resourceChoice" style="position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:1000;">
        <div style="background:#fff;padding:20px;border-radius:8px;max-width:680px;width:90%;text-align:center;">
            <h3>Chọn tài nguyên (chọn 1)</h3>
            <div id="resourceCards" style="display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:12px;"></div>
            <div style="margin-top:12px;font-size:13px;color:#555">Chọn 1 thẻ để nhận hiệu ứng trước khi chọn đội hình</div>
        </div>
    </div>

    <div id="laneContainer">

        <!-- Xạ thủ -->
        <section class="lane-section">

            <h2>XẠ THỦ</h2>

            <div class="player-row"
                id="marksmanLane">
            </div>

        </section>

        <!-- Hỗ trợ -->
        <section class="lane-section">

            <h2>HỖ TRỢ</h2>

            <div class="player-row"
                id="supportLane">
            </div>

        </section>

        <!-- Đấu sĩ -->
        <section class="lane-section">

            <h2>ĐẤU SĨ</h2>

            <div class="player-row"
                id="fighterLane">
            </div>

        </section>

        <!-- Pháp sư -->
        <section class="lane-section">

            <h2>PHÁP SƯ</h2>

            <div class="player-row"
                id="mageLane">
            </div>

        </section>

        <!-- Rừng -->
        <section class="lane-section">

            <h2>RỪNG</h2>

            <div class="player-row"
                id="jungleLane">
            </div>

        </section>

    </div>

    <div class="team-panel">

        <h2>
            ĐỘI HÌNH ĐÃ CHỌN
        </h2>

        <div id="selectedPlayers">
        </div>
        <div style="display:flex;gap:8px;justify-content:center;">
            <button id="startTournament">
                BẮT ĐẦU GIẢI ĐẤU
            </button>

            <button id="newGameBtn">
                GAME MỚI
            </button>
        </div>

    </div>

    <div id="tournamentScreen"
        class="hidden">

        <h2>
            GIẢI ĐẤU
        </h2>

        <div style="text-align:center;margin-bottom:8px;">
            <button id="rematchBtn" style="display:none;">Thi đấu lại vòng này</button>
        </div>

        <div id="matchLog">
        </div>

    </div>

    <div id="resultModal"
        class="hidden">

        <div class="result-content">

            <h1 id="resultTitle">
            </h1>

            <div id="resultRoster">
            </div>

            <button onclick="location.reload()">
                CHƠI LẠI
            </button>

            <button id="reviewBtn">
                XEM LẠI
            </button>

        </div>

    </div>

</body>

</html>

<!-- YouTube player placeholder for background music -->
<div id="ytPlayer" style="display:none"></div>
