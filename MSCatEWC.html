</head>

<body>

<div class="navbar">
<div>MSC AT EWC</div>

<div class="banner1">
<img id="bannerImg1">

<div id="bannerAdmin1">
<input type="file" id="bannerUpload1">
<button onclick="uploadBanner()">Upload Banner</button>
</div>
</div>

<div class="container">

<h2>MSC at EWC</h2>

<div id="adminPanel">
<input id="teamInput" placeholder="Type team name">
<img id="teamLogo" class="logo" style="width:50px;height:50px">
<span id="teamScore"></span>
<br><br>
<button onclick="addTeam()">Add Team</button>
</div>

<table>
<tr>
<th>Rank</th>
<th>Team</th>
<th>Base Score</th>
<th>Win</th>
<th>Lose</th>
<th>Winrate</th>
<th>Bonus</th>
<th>Placement</th>
<th>Current Score</th>
<th id="actionHeader">Action</th>
</tr>

<tbody id="rank"></tbody>
</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "global-power-ranking.firebaseapp.com",
databaseURL: "https://global-power-ranking-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "global-power-ranking",
storageBucket: "global-power-ranking.firebasestorage.app",
messagingSenderId: "382870176620",
appId: "1:382870176620:web:2223021ac756c798a2e949"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ADMIN */

let isAdmin = localStorage.getItem("login") === "true";

if(isAdmin){
document.getElementById("bannerAdmin1").style.display="block";
}else{
document.getElementById("bannerAdmin1").style.display="none";
document.getElementById("adminPanel").style.display="none";
document.getElementById("actionHeader").style.display="none";
}

/* BANNER */

window.uploadBanner=function(){
if(!isAdmin) return;

let file=document.getElementById("bannerUpload1").files[0];
if(!file) return;

let reader=new FileReader();

reader.onload=function(e){
set(ref(db,"site/banner1"),{ img:e.target.result })
}

reader.readAsDataURL(file);
};

onValue(ref(db,"site/banner1"),(snapshot)=>{
let data=snapshot.val();
if(data) document.getElementById("bannerImg1").src=data.img;
});

/* 🔥 PLACEMENT POINTS */

const placementPoints = {
champion:1000,
runnerup:800,
top3:600,
top4:400,
top8:200,
top12:160,
top16:140,
top17:100,
top19:80,
top21:40,
top23:20,
top25:0
};

/* TOURNAMENT LIST */

const tournaments=[
"tour1","tour2","tour3",
"eeca","india","thai","myanmar","vn","kh","lao","sg",
"mena","weu",
"mtc",
"latam","usa","na",
"cn","jp","kr","mgl",
"regional",
];

let teamResource={};

/* LOAD BASE SCORE */

tournaments.forEach(name=>{
onValue(ref(db,name),(snapshot)=>{
let data=snapshot.val();
if(!data) return;

Object.values(data).forEach(t=>{
if(!teamResource[t.team]){
teamResource[t.team]={logo:t.logo,score:0};
}
teamResource[t.team].score += Number(t.score)||0;
});
});
});

/* AUTO TEAM */

document.getElementById("teamInput").addEventListener("input",function(){
let team=this.value;
let data=teamResource[team];

if(data){
document.getElementById("teamLogo").src=data.logo;
document.getElementById("teamScore").innerText="Base Score: "+data.score;
}
});

/* ADD TEAM */

window.addTeam=function(){
if(!isAdmin) return;

let team=document.getElementById("teamInput").value;
let data=teamResource[team];

if(!team || !data){
alert("Team not found");
return;
}

set(ref(db,"globalRanking/"+team),{
team:team,
logo:data.logo,
baseScore:data.score,
win:0,
lose:0,
bonus:0,
placement:"",
scoremsc:0
});
};

/* LOAD RANKING */

onValue(ref(db,"globalRanking"),(snapshot)=>{

let data=snapshot.val();
if(!data) return;

let teams=Object.values(data);

teams.forEach(t=>{

let win = Number(t.win)||0;
let lose = Number(t.lose)||0;
let bonus = Number(t.bonus)||0;

let placementKey = (t.placement || "").toLowerCase();
let placementScore = placementPoints[placementKey] || 0;

/* 🔥 MSC SCORE */
let scoremsc = win*50 - lose*25 + bonus + placementScore;

/* 🔥 SAVE */
set(ref(db,"globalRanking/"+t.team+"/scoremsc"), scoremsc);

/* 🔥 FINAL */
t.currentScore = Number(t.baseScore) + scoremsc;

});

teams.sort((a,b)=>b.currentScore-a.currentScore);

let html="";

teams.forEach((t,i)=>{

let win=t.win||0;
let lose=t.lose||0;

let rate="0";
if(win+lose>0){
rate=(win/(win+lose)).toFixed(3);
}

html+=`
<tr>
<td>${i+1}</td>
<td>
<img class="logo" src="${t.logo}" onerror="this.src='https://via.placeholder.com/30'">
${t.team}
</td>
<td>${t.baseScore}</td>
<td>${win}</td>
<td>${lose}</td>
<td>${rate}</td>
<td>${t.bonus||0}</td>
<td>${t.placement||""}</td>
<td>${t.currentScore}</td>
<td>
${isAdmin ? `
<button onclick="editTeam('${t.team}')">Edit</button>
<button onclick="deleteTeam('${t.team}')">Delete</button>
` : ""}
</td>
</tr>
`;
});

document.getElementById("rank").innerHTML=html;

});

/* EDIT */

window.editTeam=function(team){
if(!isAdmin) return;

let win=parseInt(prompt("Win"))||0;
let lose=parseInt(prompt("Lose"))||0;
let bonus=parseInt(prompt("Bonus"))||0;
let placement=prompt("Placement (champion, runnerup...)")||"";

set(ref(db,"globalRanking/"+team+"/win"),win);
set(ref(db,"globalRanking/"+team+"/lose"),lose);
set(ref(db,"globalRanking/"+team+"/bonus"),bonus);
set(ref(db,"globalRanking/"+team+"/placement"),placement);
};

/* DELETE */

window.deleteTeam=function(team){
if(!isAdmin) return;

if(confirm("Delete team?")){
remove(ref(db,"globalRanking/"+team));
}
};

</script>

</body>
</html>
