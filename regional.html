<!DOCTYPE html>
<html>

<head>
<title>Regional Trophies</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">

<div>REGIONAL TITLES - FB: MỜ LỜ THẬT LOST TEACH</div>

<div class="nav-links">
<a href="MPLID.html">MPL ID</a>
<a href="MPLPH.html">MPL PH</a>
<a href="MPLMY.html">MPL MY</a>
<a href="rankingglobal.html">Global Ranking</a>
</div>

</div>

<div class="container">

<h2>Regional Trophy</h2>

<input id="teamInput" placeholder="Team name">

<img id="teamLogo" class="logo" style="width:50px;height:50px">

<br><br>

<select id="league">

<option value="">League</option>
<option value="MPL ID">MPL ID</option>
<option value="MPL PH">MPL PH</option>
<option value="MPL MY">MPL MY</option>
<option value="MPL SG">MPL SG</option>
<option value="MPL KH">MPL KH</option>
<option value="MPL VN">MPL VN</option>
<option value="MPL MENA">MPL MENA</option>
<option value="MCT SEA">MCT SEA</option>
<option value="MCT AMER">MCT AMER</option>
<option value="MCT EMEA">MCT EMEA</option>

</select>

<br><br>

<select id="placement">

<option value="">Placement</option>
<option value="champion">Champion</option>
<option value="runnerup">Runner-up</option>
<option value="top3">Top 3</option>

</select>

<br><br>

<button onclick="addRegional()">Add Trophy</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyAwv0kDiGGvFcpZm2lKhD9Jq6dFoJXWGm0",
authDomain: "global-power-ranking.firebaseapp.com",
databaseURL: "https://global-power-ranking-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "global-power-ranking",
storageBucket: "global-power-ranking.firebasestorage.app",
messagingSenderId: "382870176620",
appId: "1:382870176620:web:2223021ac756c798a2e949"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);


/* load team logos */

const tournaments = [
"tour1","tour2","tour3",
"eeca","india","thai","myanmar","vn","kh","lao","sg",
"mena","weu","mtc",
"latam","usa","na",
"cn","jp","kr","mgl"
];

let teamResource = {};

tournaments.forEach(name=>{

const r = ref(db,name);

onValue(r,(snapshot)=>{

let data=snapshot.val();

if(!data) return;

Object.values(data).forEach(t=>{

teamResource[t.team]=t.logo;

})

})

});


/* auto logo */

document.getElementById("teamInput").addEventListener("input",function(){

let team=this.value;

let logo=teamResource[team];

if(logo){
document.getElementById("teamLogo").src=logo;
}

});


/* placement text */

const placementText = {

champion:"Champion",
runnerup:"Runner-up",
top3:"Top 3"

}


/* add regional */

window.addRegional=function(){

let team=document.getElementById("teamInput").value;
let league=document.getElementById("league").value;
let placement=document.getElementById("placement").value;

if(!team || !league || !placement){

alert("Missing data");
return;

}

let text = placementText[placement] + " " + league;

set(ref(db,"regional/"+team+"/"+league),{

team:team,
placement:text,
score:100

})

alert("Regional trophy added")

}

</script>

</body>
</html>
