<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Player Editor</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="player_editor.js" defer></script>
</head>
<body>
  <div class="navbar">
    <div>Chỉnh sửa Player</div>
    <div class="nav-links">
      <a href="Index36.html">Trở về</a>
      <button id="themeToggleBtn">🌙 Tối</button>
    </div>
  </div>

  <main style="padding:20px;display:flex;gap:20px;flex-wrap:wrap;">
    <section style="flex:1 1 360px;min-width:320px;">
      <div class="card">
        <h3>Danh sách người chơi</h3>
        <div id="playersList" style="display:flex;flex-direction:column;gap:8px;margin-top:12px;max-height:50vh;overflow:auto"></div>
      </div>

      <div class="card" style="margin-top:12px;">
        <h3>Trung bình theo giá</h3>
        <div style="overflow:auto;margin-top:8px;">
          <table id="costStats" style="width:100%;">
            <thead>
              <tr><th>Giá</th><th>Count</th><th>Skill</th><th>Clutch</th><th>Synergy</th></tr>
            </thead>
            <tbody>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <section style="flex:1 1 380px;min-width:320px;">
      <div class="card" id="editorCard">
        <h3>Chi tiết (nhấn tên để chỉnh sửa)</h3>
        <div id="editor" style="display:none;margin-top:8px;">
          <div style="margin-bottom:8px;"><strong id="editName"></strong></div>
          <label>Giá: <input id="inpCost" type="number" min="1" max="5" style="width:80px"></label><br>
          <label>Kỹ năng: <input id="inpSkill" type="number" min="0" max="10"></label><br>
          <label>Đột biến: <input id="inpClutch" type="number" min="0" max="10"></label><br>
          <label>Phối hợp: <input id="inpSynergy" type="number" min="0" max="10"></label><br>
          <div style="margin-top:12px;display:flex;gap:8px;">
            <button id="saveBtn">Lưu</button>
            <button id="cancelBtn">Hủy</button>
            <button id="addRosterBtn">Thêm vào đội</button>
          </div>
        </div>
        <div id="noSelection" style="color:var(--text-secondary);margin-top:8px;">Chưa chọn người chơi</div>
      </div>
    </section>
    <section style="flex:1 1 280px;min-width:260px;">
      <div class="card">
        <h3>Đội hình hiện tại</h3>
        <div id="rosterList" style="display:flex;flex-direction:column;gap:8px;margin-top:12px;min-height:120px;">
          <div style="color:var(--text-secondary)">Chưa có thành viên</div>
        </div>
      </div>
    </section>
  </main>

</body>
</html>
