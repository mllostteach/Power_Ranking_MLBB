<html>

<head>
<title>M8 World Championship</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">

<div>M8 WORLD CHAMPIONSHIP - FB: MỜ LỜ THẬT LOST TEACH</div>

<div class="banner1">

<img id="bannerImg2">

<div id="bannerAdmin2">

<input type="file" id="bannerUpload2">
<button onclick="uploadBanner2()">Upload Banner</button>

</div>

</div>


<div class="container">

<h2>M8 Global Ranking</h2>

<div id="adminPanel">

<input id="teamInput" placeholder="Type team name">

<img id="teamLogo" class="logo" style="width:50px;height:50px">

<span id="teamScore"></span>

<br><br>

<button onclick="addTeam()">Add Team</button>

</div>

<table>

<tr>
<th>Rank</th>
<th>Team</th>
<th>Base Score</th>
<th>Win</th>
<th>Lose</th>
<th>Winrate</th>
<th>Bonus</th>
<th>Placement</th>
<th>Current Score</th>
<th id="actionHeader">Action</th>
</tr>

<tbody id="rank"></tbody>

</table>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyAwv0kDiGGvFcpZm2lKhD9Jq6dFoJXWGm0",
authDomain: "global-power-ranking.firebaseapp.com",
databaseURL: "https://global-power-ranking-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "global-power-ranking",
storageBucket: "global-power-ranking.firebasestorage.app",
messagingSenderId: "382870176620",
appId: "1:382870176620:web:2223021ac756c798a2e949"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);


/* ADMIN CHECK */

let isAdmin = localStorage.getItem("login") === "true";

if(isAdmin){
document.getElementById("bannerAdmin2").style.display="block";
}else{
document.getElementById("bannerAdmin2").style.display="none";
document.getElementById("adminPanel").style.display="none";
document.getElementById("actionHeader").style.display="none";
}


/* BANNER UPLOAD */

window.uploadBanner2=function(){

if(!isAdmin) return;

let file=document.getElementById("bannerUpload2").files[0];
if(!file) return;

let reader=new FileReader();

reader.onload=function(e){

set(ref(db,"site/banner2"),{
img:e.target.result
})

}

reader.readAsDataURL(file);

}


/* LOAD BANNER */

onValue(ref(db,"site/banner2"),(snapshot)=>{

let data=snapshot.val();
if(!data) return;

document.getElementById("bannerImg2").src=data.img;

});


/* M8 PLACEMENT POINTS */

const placementPoints={

Champion:3000,
Runnerup:1800,
Top3:1600,
Top4:1500,
Top8:1300,
Top12:1100,
Top16:900,
Top17:600,
Top19:400,
Top21:300,
Top23:200,
Top25:0

}


/* TOURNAMENT LIST */

const tournaments=[

"tour1","tour2","tour3",
"eeca","india","thai","myanmar","vn","kh","lao","sg",
"mena","weu",
"mtc",
"latam","usa","na",
"cn","jp","kr","mgl",
"regional"

];

let teamResource={};


/* LOAD TEAM DATA */

tournaments.forEach(name=>{

onValue(ref(db,name),(snapshot)=>{

let data=snapshot.val();
if(!data) return;

Object.values(data).forEach(t=>{

if(!teamResource[t.team]){

teamResource[t.team]={

logo:t.logo,
score:0

};

}

teamResource[t.team].score+=Number(t.score)||0;

})

})

});


/* AUTO TEAM INFO */

document.getElementById("teamInput").addEventListener("input",function(){

let team=this.value;
let data=teamResource[team];

if(data){

document.getElementById("teamLogo").src=data.logo;
document.getElementById("teamScore").innerText="Base Score: "+data.score;

}

});


/* ADD TEAM */

window.addTeam=function(){

if(!isAdmin) return;

let team=document.getElementById("teamInput").value;
let data=teamResource[team];

if(!team || !data){

alert("Team not found");
return;

}

set(ref(db,"m8Ranking/"+team),{

team:team,
logo:data.logo,
baseScore:data.score,
win:0,
lose:0,
bonus:0,
placement:""

});

};


/* LOAD RANKING */

onValue(ref(db,"m8Ranking"),(snapshot)=>{

let data=snapshot.val();
if(!data) return;

let teams=Object.values(data);

teams.forEach(t=>{

let placementScore=placementPoints[t.placement]||0;

t.currentScore=
Number(t.baseScore)
+Number(t.bonus||0)
+placementScore;

});

teams.sort((a,b)=>b.currentScore-a.currentScore);

let html="";

teams.forEach((t,i)=>{

let win=t.win||0;
let lose=t.lose||0;

let rate="0";

if(win+lose>0){
rate=(win/(win+lose)).toFixed(3);
}

html+=`

<tr>

<td>${i+1}</td>

<td>
<img class="logo" src="${t.logo}" onerror="this.src='https://via.placeholder.com/30'">
${t.team}
</td>

<td>${t.baseScore}</td>

<td>${win}</td>
<td>${lose}</td>

<td>${rate}</td>

<td>${t.bonus||0}</td>

<td>${t.placement||""}</td>

<td>${t.currentScore}</td>

<td>

${isAdmin ? `
<button onclick="editTeam('${t.team}')">Edit</button>
<button onclick="deleteTeam('${t.team}')">Delete</button>
` : ""}

</td>

</tr>

`;

});

document.getElementById("rank").innerHTML=html;

});


/* EDIT */

window.editTeam=function(team){

if(!isAdmin) return;

let win=parseInt(prompt("Win"))||0;
let lose=parseInt(prompt("Lose"))||0;
let bonus=parseInt(prompt("Bonus"))||0;
let placement=prompt("Placement (Champion, Runnerup, Top3...)")||"";

set(ref(db,"m8Ranking/"+team+"/win"),win);
set(ref(db,"m8Ranking/"+team+"/lose"),lose);
set(ref(db,"m8Ranking/"+team+"/bonus"),bonus);
set(ref(db,"m8Ranking/"+team+"/placement"),placement);

}


/* DELETE */

window.deleteTeam=function(team){

if(!isAdmin) return;

if(confirm("Delete team?")){
remove(ref(db,"m8Ranking/"+team));
}

}

</script>

</body>
</html>
